<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russianland | Сервер Minecraft</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=VT323&display=swap');
       
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f0ff;
            --neon-green: #39ff14;
            --dark: #0a0a0a;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark);
            color: #e0e0e0;
            font-family: 'VT323', monospace;
            overflow-x: hidden;
        }
        /* Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1.5s ease;
        }
        .r-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 16rem;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 80px var(--neon-pink), 0 0 140px var(--neon-cyan);
            animation: rPulse 2s infinite alternate;
        }
        @keyframes rPulse {
            from { transform: scale(0.85); }
            to { transform: scale(1.08); }
        }
        section { padding: 120px 10%; max-width: 1200px; margin: 0 auto; }
        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.8rem;
            color: var(--neon-pink);
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 0 0 30px var(--neon-pink);
        }
        h3 { color: var(--neon-green); margin: 45px 0 25px; font-size: 2.1rem; }
        ul { list-style: none; }
        li { padding: 10px 0; border-bottom: 1px solid rgba(255,0,255,0.15); line-height: 1.45; }
        .ip {
            background: rgba(0,0,0,0.85);
            padding: 25px 70px;
            border: 4px solid var(--neon-pink);
            font-size: 2rem;
            display: inline-block;
            cursor: pointer;
            box-shadow: 0 0 50px var(--neon-pink);
            margin: 20px;
        }
        .btn {
            color: var(--neon-green);
            border: 3px solid var(--neon-green);
            padding: 18px 50px;
            font-size: 1.6rem;
            text-decoration: none;
            display: inline-block;
            margin: 20px;
            transition: 0.4s;
        }
        .btn:hover { background: var(--neon-green); color: black; }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">
        <div class="r-logo">R</div>
    </div>

    <nav style="position:fixed; top:0; width:100%; background:rgba(10,10,20,0.95); padding:15px 0; z-index:100; text-align:center; border-bottom:2px solid var(--neon-cyan);">
        <a href="#features" style="color:var(--neon-cyan); margin:0 25px;">ОСОБЕННОСТИ</a>
        <a href="#rules" style="color:var(--neon-cyan); margin:0 25px;">ПРАВИЛА</a>
        <a href="#connect" style="color:var(--neon-cyan); margin:0 25px;">ПОДКЛЮЧЕНИЕ</a>
        <a href="#admin" style="color:var(--neon-cyan); margin:0 25px;">АДМИНИСТРАЦИЯ</a>
        <a href="#discord" style="color:var(--neon-cyan); margin:0 25px;">DISCORD</a>
    </nav>

    <!-- Шапка -->
    <header id="home" style="height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;">
        <div>
            <div style="font-family:'Orbitron',sans-serif; font-size:7rem; color:var(--neon-cyan);">RUSSIANLAND</div>
            <div style="font-size:2.4rem; color:var(--neon-green); margin-top:20px;">Сервер выживание</div>
            <div style="margin-top:30px; font-size:1.4rem;">Версия: 1.21.x</div>
        </div>
    </header>

    <!-- Остальной контент (особенности, правила, подключение, администрация, discord) -->

    <footer style="text-align:center; padding:50px; background:#050505;">
        <p>&copy; 2026 RUSSIANLAND • Все права защищены</p>
    </footer>

    <script>
        // Исправленный preloader
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.style.opacity = '0';
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 1500);
            }, 5000); // 5 секунд (можно изменить)
        });

        function copyIP() {
            navigator.clipboard.writeText("d35.gamely.pro:20036");
            alert("IP скопирован: d35.gamely.pro:20036");
        }

        // Отправка заявки
        async function sendApplication() {
            const nick = document.getElementById('nickname').value.trim();
            if (!nick) return alert("Введи ник!");

            const webhookUrl = "https://discord.com/api/webhooks/ТОЙ_ВЕБХУК_СЮДА"; // ← Замени

            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**🔥 НОВАЯ ЗАЯВКА НА АДМИНКУ!**\n\n**Ник:** ${nick}\n**Время:** ${new Date().toLocaleString('ru-RU')}\n\n@here`,
                        username: "RussianLand Bot"
                    })
                });
                alert(`Заявка от ${nick} успешно отправлена!`);
            } catch (e) {
                alert("Ошибка отправки. Проверь webhook URL.");
            }
        }
    </script>
</body>
</html>
